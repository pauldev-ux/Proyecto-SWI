<ng-container *ngIf="!estaAutenticado()">
  <router-outlet></router-outlet>
</ng-container>

<ng-container *ngIf="estaAutenticado()">
  <div class="app-layout">
    <aside class="sidebar" [class.cerrado]="!sidebarAbierto">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">⚡</span>
          <span class="logo-text" *ngIf="sidebarAbierto">{{ title }}</span>
        </div>
        <button class="toggle-btn" (click)="toggleSidebar()">
          {{ sidebarAbierto ? '❮' : '❯' }}
        </button>
      </div>

      <nav class="sidebar-menu">
        <div class="menu-section" *ngIf="puedeVerDashboard()">
          <p class="section-title" *ngIf="sidebarAbierto">PRINCIPAL</p>
          <a routerLink="/dashboard" routerLinkActive="active" class="menu-item">
            <span class="menu-icon">📊</span>
            <span class="menu-text" *ngIf="sidebarAbierto">Dashboard</span>
          </a>
        </div>

        <div class="menu-section">
          <p class="section-title" *ngIf="sidebarAbierto">GESTIÓN</p>

          <a
            routerLink="/tramites"
            routerLinkActive="active"
            class="menu-item"
            *ngIf="puedeVerTramites()"
          >
            <span class="menu-icon">📝</span>
            <span class="menu-text" *ngIf="sidebarAbierto">Trámites</span>
          </a>

          <a
            routerLink="/chatbot"
            routerLinkActive="active"
            class="menu-item"
            *ngIf="puedeVerAsistente()"
          >
            <span class="menu-icon">🤖</span>
            <span class="menu-text" *ngIf="sidebarAbierto">Asistente IA</span>
          </a>

          <a
            routerLink="/departamentos"
            routerLinkActive="active"
            class="menu-item"
            *ngIf="puedeVerDepartamentos()"
          >
            <span class="menu-icon">🏢</span>
            <span class="menu-text" *ngIf="sidebarAbierto">Departamentos</span>
          </a>

          <a
            routerLink="/monitor"
            routerLinkActive="active"
            class="menu-item"
            *ngIf="puedeVerMonitor()"
          >
            <span class="menu-icon">📡</span>
            <span class="menu-text" *ngIf="sidebarAbierto">Monitor en Vivo</span>
          </a>

          <a
            routerLink="/analytics"
            routerLinkActive="active"
            class="menu-item"
            *ngIf="puedeVerAnalytics()"
          >
            <span class="menu-icon">📈</span>
            <span class="menu-text" *ngIf="sidebarAbierto">Analytics</span>
          </a>

          <a
            routerLink="/usuarios"
            routerLinkActive="active"
            class="menu-item"
            *ngIf="puedeVerUsuarios()"
          >
            <span class="menu-icon">👥</span>
            <span class="menu-text" *ngIf="sidebarAbierto">Usuarios</span>
          </a>
        </div>
      </nav>

      <div class="sidebar-footer" *ngIf="sidebarAbierto">
        <div class="user-info">
          <div class="user-avatar">
            {{ (usuarioActual?.nombre || '').charAt(0).toUpperCase() }}
          </div>
          <div class="user-details">
            <p class="user-name">{{ usuarioActual?.nombre }}</p>
            <p class="user-role">{{ obtenerRolLabel() }}</p>
          </div>
        </div>
        <button class="logout-btn" (click)="logout()">Cerrar sesión</button>
      </div>
    </aside>

    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</ng-container>
